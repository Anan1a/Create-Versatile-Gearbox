# 这是一个示例 neoforge.mods.toml 文件。它包含与加载模组相关的数据。
# 有几个必填字段 (#mandatory)，以及更多可选字段 (#optional)。
# 整体格式是标准的 TOML 格式，版本 v0.5.0。
# 注意此文件中有几个 TOML 列表。
# 在此处查找有关 toml 格式的更多信息：https://github.com/toml-lang/toml

# 要加载的模组加载器类型名称 - 对于常规 FML @Mod 模组，应为 javafml
modLoader="javafml" #必填

# 与所述模组加载器匹配的版本范围 - 对于常规 FML @Mod，它将是 FML 版本。当前为 2。
loaderVersion="${loader_version_range}" #必填

# 你的模组的许可证。这是必填的元数据，便于理解你的重新分发属性。
# 请在 https://choosealicense.com/ 查看你的选项。保留所有权利是默认的版权立场，因此是此处的默认值。
license="${mod_license}"

# 当此模组出现问题时，请参考的 URL
issueTrackerURL="https://github.com/Anan1a/Create-Versatile-Gearbox/issues" #可选

# 模组列表 - 此处允许的数量由各个模组加载器决定
[[mods]] #必填

# 模组的 modid
modId="${mod_id}" #必填

# 模组的版本号
version="${mod_version}" #必填

# 模组的显示名称
displayName="${mod_name}" #必填

# 用于查询此模组更新的 URL。请参阅 JSON 更新规范 https://docs.neoforged.net/docs/misc/updatechecker/
#updateJSONURL="https://change.me.example.invalid/updates.json" #可选

# 模组主页的 URL，显示在模组 UI 中
displayURL="https://github.com/Anan1a/Create-Versatile-Gearbox" #可选

# 包含用于显示的徽标的文件名（位于 mod JAR 的根目录中）
logoFile="icon.png" #可选

# 显示在模组 UI 中的文本字段
#credits="" #可选

# 模组的作者，显示在模组 UI 中（可选）
authors="Anan1a"

# 模组的描述文本（多行！）(#必填)
description='''
一个 Create 附属模组，添加了一个万能变速箱，在所有六个面上都有独立可配置的输入/输出，并支持红石控制。
'''

# [[mixins]] 块允许你声明你的 mixin 配置给 FML，以便它被加载。
#[[mixins]]
#config="${mod_id}.mixins.json"

# [[accessTransformers]] 块允许你声明 AT 文件的位置。
# 如果省略此块，将尝试从 META-INF/accesstransformer.cfg 加载 AT
#[[accessTransformers]]
#file="META-INF/accesstransformer.cfg"

# coremods 配置文件路径不可配置，始终从 META-INF/coremods.json 加载

# 依赖项 - 使用 . 表示特定 modid 的依赖项。依赖项是可选的。
[[dependencies."${mod_id}"]] #可选
    # 依赖项的 modid
    modId="neoforge" #必填
    # 依赖项的类型。可以是 "required"、"optional"、"incompatible" 或 "discouraged"（不区分大小写）。
    # 'required' 要求模组存在，'optional' 不需要
    # 'incompatible' 将在模组存在时阻止游戏加载，'discouraged' 将显示警告
    type="required" #必填
    # 描述为什么需要依赖项或为什么不兼容的可选字段
    # reason="..."
    # 依赖项的版本范围
    versionRange="[${neo_version},)" #必填
    # 依赖项的顺序关系。
    # BEFORE - 此模组在依赖项之前加载
    # AFTER - 此模组在依赖项之后加载
    ordering="NONE"
    # 应用此依赖项的侧 - BOTH、CLIENT 或 SERVER
    side="BOTH"

# 这是另一个依赖项
[[dependencies."${mod_id}"]]
    modId="minecraft"
    type="required"
    # 此版本范围声明当前 minecraft 版本的最小值，不包括下一个主要版本
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Create
[[dependencies."${mod_id}"]]
modId = "create"
type = "required"
versionRange = "[6.0.10,)"
ordering = "NONE"
side = "BOTH"

# Features 是游戏环境的特定属性，你可能想要声明你需要的属性。此示例声明
# 你的模组需要 GL 版本 3.2 或更高版本。将添加其他功能。它们是侧感知的，因此声明这不会
# 例如，阻止你的模组在服务器上加载。
#[features.${mod_id}]
#openGLVersion="[3.2,)"
